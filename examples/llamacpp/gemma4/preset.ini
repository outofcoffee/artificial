# A llama.cpp preset for Gemma-4-12B-IT, mirroring the llama-server command in
# this directory's README (including the MTP draft model). `outfit serve` turns
# it into that command and runs it.
# See https://github.com/ggml-org/llama.cpp/blob/master/docs/preset.md

[*]
host  = 127.0.0.1
port  = 8080
jinja = 1            # required for Gemma chat formatting
ngl   = 99           # offload all layers to the GPU; lower for limited VRAM

[gemma-4-12b-it]     # the Outfit's ALIAS selects this section
hf              = Zambizi/slim-rpcache-unsloth-gemma-4-12b-gguf-mtp-mmporj:UD-Q8_K_XL
ctx-size        = 32768
spec-type       = draft-mtp   # Multi-Token Prediction via the bundled draft model
spec-draft-n-max = 4
cache-reuse     = 256
