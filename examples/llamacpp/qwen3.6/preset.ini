# A llama.cpp preset for Qwen3.6-35B-A3B, mirroring the llama-server command in
# this directory's README. `outfit serve` turns it into that command and runs it.
# See https://github.com/ggml-org/llama.cpp/blob/master/docs/preset.md

[*]
host  = 127.0.0.1
port  = 8080
jinja = 1            # required for Qwen3 tool calling
ngl   = 99           # offload all layers to the GPU; lower for limited VRAM

[qwen3.6-35b-a3b]    # the Outfit's ALIAS selects this section
hf       = unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL
ctx-size = 32768     # keep in step with the Outfit's CONTEXT
