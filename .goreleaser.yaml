version: 2

project_name: oc-config

builds:
  - id: oc-config
    binary: oc-config
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - name: oc-config
    # Publish the formula to the dedicated tap repository.
    repository:
      owner: outofcoffee
      name: homebrew-tap
      branch: main
      # Uses a PAT with write access to the tap repo (the default GITHUB_TOKEN
      # only has access to this repository, not the tap).
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/outofcoffee/configure-opencode"
    description: "Configure opencode provider catalogues"
    license: "MIT"
    # Skip publishing the formula for pre-release tags.
    skip_upload: auto
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    test: |
      system "#{bin}/oc-config", "--help"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other changes
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"

release:
  draft: false
  prerelease: auto
